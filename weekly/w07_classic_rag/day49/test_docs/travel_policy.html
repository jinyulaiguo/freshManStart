        body {
            font-family: 'Inter', sans-serif;

<body>
    <div class="container">
        <h1>公司差旅政策细则</h1>
        <p>为规范公司员工差旅行为，特制定本细则。本细则适用于公司全体正式员工。</p>
        
        <h2>第一条 住宿费报销标准</h2>
        <p>单次差旅的住宿费报销上限为每天 500 元人民币。超出此限额的部分，除非有特殊审批，否则需由员工个人自理。</p>
        
        <h2>第二条 交通补贴规定</h2>
        <p>员工出差可凭票据报销二等座高铁或经济舱机票。市内交通补贴为每日 80 元包干。</p>
    </div>
