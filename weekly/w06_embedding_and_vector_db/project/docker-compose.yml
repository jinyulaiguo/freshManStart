version: '3.8'

services:
  qdrant:
    image: qdrant/qdrant:v1.10.0
    container_name: qdrant_rag_engine
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    environment:
      - QDRANT__SERVICE__ENABLE_STATIC_CONTENT_SHARE=true
    restart: always

volumes:
  qdrant_storage:
    driver: local
